@if (isOpen()) {
  <dialog class="modal modal-open" role="dialog" aria-modal="true" aria-labelledby="proof-modal-title">
    <div class="modal-box">
      <h3 id="proof-modal-title" class="font-bold text-lg mb-4">{{ title() }}</h3>
      @if (loading()) {
        <div class="flex justify-center py-8">
          <span class="loading loading-spinner loading-lg"></span>
        </div>
      } @else if (resolvedUrl()) {
        <img
          [src]="resolvedUrl()"
          class="w-full rounded-lg"
          alt="憑證"
          loading="lazy"
          (error)="onImageError()"
        />
      } @else {
        <div class="text-center py-8">
          <p class="text-base-content/50 mb-4">
            {{ errorMessage() || '無法載入憑證圖片' }}
          </p>
          <button class="btn btn-sm btn-outline" (click)="retry()">
            重新載入
          </button>
        </div>
      }
      <div class="modal-action">
        <button class="btn" (click)="onClose()">關閉</button>
      </div>
    </div>
    <div class="modal-backdrop" (click)="onBackdropClick($event)"></div>
  </dialog>
}
